name: Publish SDKs

on:
  push:
    tags:
      - 'sdk-v*'

jobs:
  # ── Python SDK ──────────────────────────────────────────────
  publish-python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: layer5/sdks/python

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: pip install build twine

      - name: Install SDK dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v

      - name: Build distribution
        run: python -m build

      - name: Check if version already exists on PyPI
        id: pypi_check
        run: |
          VERSION=$(python -c "import tomllib; f=open('pyproject.toml','rb'); d=tomllib.load(f); print(d['project']['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://pypi.org/pypi/layerinfinite-sdk/$VERSION/json)
          if [ "$STATUS" = "200" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Version $VERSION already exists on PyPI - skipping upload."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Version $VERSION not found on PyPI - will upload."
          fi

      - name: Publish to PyPI
        if: steps.pypi_check.outputs.exists == 'false'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: twine upload dist/*

  # ── TypeScript SDK ──────────────────────────────────────────
  publish-typescript:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: layer5/sdks/typescript

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build package
        run: npm run build

      - name: Check if version already exists on npm
        id: npm_check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://registry.npmjs.org/@layerinfinite%2fsdk/$VERSION)
          if [ "$STATUS" = "200" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Version $VERSION already exists on npm - skipping publish."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Version $VERSION not found on npm - will publish."
          fi

      - name: Publish to npm
        if: steps.npm_check.outputs.exists == 'false'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
