name: Publish Python SDK to PyPI

on:
  push:
    tags:
      - 'sdk-python-v*'

jobs:
  verify-version:
    name: Verify version matches tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract tag version
        id: tag
        run: echo "version=${GITHUB_REF_NAME#sdk-python-v}" >> $GITHUB_OUTPUT

      - name: Extract pyproject.toml version
        id: toml
        run: |
          version=$(grep '^version' layer5/sdks/python/pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Fail if versions don't match
        run: |
          TAG="${{ steps.tag.outputs.version }}"
          TOML="${{ steps.toml.outputs.version }}"
          echo "Tag version:          $TAG"
          echo "pyproject.toml version: $TOML"
          if [ "$TAG" != "$TOML" ]; then
            echo "❌ Version mismatch: git tag is sdk-python-v$TAG but pyproject.toml has $TOML"
            echo "   Update pyproject.toml version to $TAG before tagging."
            exit 1
          fi
          echo "✅ Versions match: $TAG"

  publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    needs: verify-version
    environment: pypi
    permissions:
      contents: write   # for GitHub Release
      id-token: write   # for trusted publishing (optional fallback to token)

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: pip install build twine

      - name: Build distribution
        working-directory: layer5/sdks/python
        run: python -m build

      - name: Publish to PyPI
        working-directory: layer5/sdks/python
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*

      - name: Run smoke test
        env:
          API_KEY: ${{ secrets.SMOKE_TEST_API_KEY }}
          BASE_URL: https://outcome-production.up.railway.app
        run: node layer5/sdks/smoke-test.js

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Python SDK ${{ github.ref_name }}
          body: |
            ## Python SDK ${{ github.ref_name }}

            Published to PyPI: https://pypi.org/project/layerinfinite-sdk/

            ### Install
            ```bash
            pip install layerinfinite-sdk==${{ needs.verify-version.outputs.version }}
            ```

            See [CHANGELOG.md](layer5/sdks/python/CHANGELOG.md) for full release notes.
          draft: false
          prerelease: false
