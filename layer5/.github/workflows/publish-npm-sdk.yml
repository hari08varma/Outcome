name: Publish TypeScript SDK to npm

on:
  push:
    tags:
      - 'sdk-ts-v*'

jobs:
  verify-version:
    name: Verify version matches tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.tag.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract tag version
        id: tag
        run: echo "version=${GITHUB_REF_NAME#sdk-ts-v}" >> $GITHUB_OUTPUT

      - name: Extract package.json version
        id: pkg
        run: |
          version=$(node -p "require('./layer5/sdks/typescript/package.json').version")
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Fail if versions don't match
        run: |
          TAG="${{ steps.tag.outputs.version }}"
          PKG="${{ steps.pkg.outputs.version }}"
          echo "Tag version:          $TAG"
          echo "package.json version: $PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "❌ Version mismatch: git tag is sdk-ts-v$TAG but package.json has $PKG"
            echo "   Update package.json version to $TAG before tagging."
            exit 1
          fi
          echo "✅ Versions match: $TAG"

  publish:
    name: Build, typecheck, and publish to npm
    runs-on: ubuntu-latest
    needs: verify-version
    environment: npm
    permissions:
      contents: write   # for GitHub Release

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        working-directory: layer5/sdks/typescript
        run: npm ci

      - name: Build
        working-directory: layer5/sdks/typescript
        run: npm run build

      - name: Typecheck
        working-directory: layer5/sdks/typescript
        run: npm run typecheck

      - name: Publish to npm
        working-directory: layer5/sdks/typescript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish

      - name: Run smoke test
        env:
          API_KEY: ${{ secrets.SMOKE_TEST_API_KEY }}
          BASE_URL: https://outcome-production.up.railway.app
        run: node layer5/sdks/smoke-test.js

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: TypeScript SDK ${{ github.ref_name }}
          body: |
            ## TypeScript SDK ${{ github.ref_name }}

            Published to npm: https://www.npmjs.com/package/@layerinfinite/sdk

            ### Install
            ```bash
            npm install @layerinfinite/sdk@${{ needs.verify-version.outputs.version }}
            ```

            See [CHANGELOG.md](layer5/sdks/typescript/CHANGELOG.md) for full release notes.
          draft: false
          prerelease: false
