apiVersion: run.googleapis.com/v1
kind: Job
metadata:
  name: layerinfinite-world-model-trainer
  annotations:
    run.googleapis.com/launch-stage: GA
spec:
  template:
    spec:
      containers:
        - image: gcr.io/[PROJECT_ID]/layerinfinite-training:latest
          env:
            - name: SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: layerinfinite-secrets
                  key: SUPABASE_URL
            - name: SUPABASE_SERVICE_ROLE_KEY
              valueFrom:
                secretKeyRef:
                  name: layerinfinite-secrets
                  key: SUPABASE_SERVICE_ROLE_KEY
          resources:
            limits:
              cpu: "2"
              memory: "2Gi"
      timeoutSeconds: 3600  # 1 hour max
      maxRetries: 1  # Don't retry failed training
