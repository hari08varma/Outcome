[build]
builder = "nixpacks"
buildCommand = "cd layer5/api && npm install && npm run build"

[deploy]
startCommand = "cd layer5/api && node dist/index.js"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
healthcheckPath = "/"
healthcheckTimeout = 60

[environments.production]
NODE_ENV = "production"
